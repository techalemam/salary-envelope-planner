<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a73e8">
    <title>Salary Envelope Planner</title>
    <link rel="manifest" href="manifest.json">
    <!-- i18next Library -->
    <script src="https://unpkg.com/i18next@23.11.2/i18next.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        [dir="rtl"] { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            line-height: 1.5;
            transition: background 0.3s;
            overflow-x: hidden;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        /* What-If Mode */
        body.what-if-active { background: #fff1f2; }
        .what-if-banner {
            display: none;
            background: var(--danger);
            color: white;
            padding: 12px;
            text-align: center;
            font-weight: 700;
            position: sticky;
            top: 0;
            z-index: 2000;
            box-shadow: var(--shadow);
        }
        body.what-if-active .what-if-banner { display: block; }

        header {
            background: linear-gradient(135deg, var(--primary) 0%, #a855f7 100%);
            color: white;
            padding: 30px;
            border-radius: var(--radius);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-lg);
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-outline { background: white; border: 1px solid #e2e8f0; color: var(--text-main); }
        .btn-outline:hover { background: #f1f5f9; }

        .btn-header {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            backdrop-filter: blur(4px);
        }
        .btn-header:hover { background: rgba(255,255,255,0.25); }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border-bottom: 4px solid var(--primary);
            transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-3px); }
        .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em; }
        .stat-val { font-size: 26px; font-weight: 800; margin-top: 8px; color: var(--text-main); }

        .warning-strip {
            background: #fef2f2;
            border: 1px solid #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-weight: 700;
            align-items: center;
            gap: 10px;
        }

        .card-box {
            background: var(--card-bg);
            padding: 25px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 30px;
        }

        .table-wrap {
            overflow-x: auto;
            margin-top: 20px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th {
            text-align: left;
            padding: 15px;
            background: #f8fafc;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }
        [dir="rtl"] th { text-align: right; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-weight: 500; }
        tr:nth-child(even) { background-color: #fafafa; }
        .tr-total { background: #f1f5f9 !important; font-weight: 800; color: var(--primary-dark); }
        .num { font-family: 'Inter', sans-serif; font-variant-numeric: tabular-nums; }
        [dir="ltr"] .num-cell { text-align: left; }
        [dir="rtl"] .num-cell { text-align: right; }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            padding-bottom: 2px;
            border-bottom: 2px solid #e2e8f0;
        }
        .tab {
            padding: 12px 24px;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: 700;
            color: var(--text-muted);
            font-size: 16px;
            position: relative;
            transition: color 0.2s;
        }
        .tab.active { color: var(--primary); }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--primary);
            border-radius: 3px;
        }

        .pane { display: none; animation: fadeIn 0.3s ease; }
        .pane.active { display: block; }

        .env-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }
        .env-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 25px;
            box-shadow: var(--shadow);
            position: relative;
            border-left: 6px solid #cbd5e0;
            transition: all 0.3s;
        }
        [dir="rtl"] .env-card { border-left: none; border-right: 6px solid #cbd5e0; }
        .env-card.goal { border-color: var(--success); }
        .env-card.debt { border-color: var(--danger); }
        .env-card.budget { border-color: var(--warning); }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.7);
            z-index: 3000;
            align-items: center; justify-content: center;
            backdrop-filter: blur(8px);
            padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-body { background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 550px; }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
        }
        .badge-goal { background: #d1fae5; color: #065f46; }
        .badge-debt { background: #fee2e2; color: #991b1b; }
        .badge-budget { background: #fef3c7; color: #92400e; }

        .field { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; outline: none; }
        .field:focus { border-color: var(--primary); }
    </style>
</head>
<body id="bodyRoot">
    <div class="what-if-banner" data-i18n="sandbox_active">⚠️ Sandbox mode active - changes not saved</div>

    <div class="container">
        <header>
            <div>
                <h1 id="tr-app-title" data-i18n="app_title">💰 Salary Planner</h1>
                <p id="modeStatus" style="font-size: 14px; opacity: 0.9;" data-i18n="real_time_plan">Real-Time Financial Plan</p>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-header" id="langBtn" onclick="toggleLang()">English</button>
                <button class="btn btn-header" id="whatIfToggle" onclick="toggleWhatIf()" data-i18n="act_sandbox">Activate What-If</button>
                <button class="btn btn-header" onclick="exportData()" data-i18n="export">Export</button>
                <button class="btn btn-header" onclick="document.getElementById('fileInput').click()" data-i18n="import">Import</button>
                <input type="file" id="fileInput" style="display:none" onchange="importData(event)">
            </div>
        </header>

        <div id="overAllocWarning" class="warning-strip">
            <span data-i18n="warning_overAllocated">Warning: Total allocations exceed net monthly salary</span>
        </div>

        <div class="summary-grid" id="highLevelSummary"></div>

        <div class="tabs">
            <button class="tab active" id="tab-plan" onclick="showTab('plan')" data-i18n="tab_env">The Envelopes</button>
            <button class="tab" id="tab-visual" onclick="showTab('visual')" data-i18n="tab_visual">Visual Timeline</button>
            <button class="tab" id="tab-config" onclick="showTab('config')" data-i18n="tab_settings">Settings</button>
        </div>

        <div id="planSection" class="pane active">
            <div class="card-box">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h2 data-i18n="summary_title">Detailed Summary</h2>
                    <button class="btn btn-primary" onclick="openAddModal()">
                        <span data-i18n="add_btn">+ Add New Envelope</span>
                    </button>
                </div>
                <div class="table-wrap" id="summaryTableContainer"></div>
            </div>
            <div id="categorySections"></div>
        </div>

        <div id="visualSection" class="pane">
            <div class="card-box">
                <h2 data-i18n="tab_visual">Visual Timeline</h2>
                <div id="ganttChart" style="margin-top: 20px;"></div>
            </div>
        </div>

        <div id="configSection" class="pane">
            <div class="card-box" style="max-width: 600px; margin: 0 auto;">
                <h2 data-i18n="cfg_title">Global Settings</h2>
                <div style="margin-top: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 700;" data-i18n="cfg_salary">Monthly Net Salary</label>
                    <input type="number" id="cfgSalary" class="field num" onchange="updateGlobal()">
                </div>
                <div style="margin-top: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 700;" data-i18n="cfg_date">Plan Reference Date</label>
                    <input type="date" id="cfgDate" class="field" onchange="updateGlobal()">
                </div>
                <button class="btn btn-danger" style="margin-top: 30px; width: 100%;" onclick="resetAll()" data-i18n="btn_reset">Reset All Data</button>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="envModal" class="modal">
        <form class="modal-body" onsubmit="saveEnv(event)">
            <h2 id="modalTitle" style="margin-bottom: 25px;"></h2>
            <div style="margin-bottom: 15px;">
                <label data-i18n="lbl_name">Envelope Name</label>
                <input type="text" id="mName" class="field" required>
            </div>
            <div style="margin-bottom: 15px;">
                <label data-i18n="lbl_type">Envelope Type</label>
                <select id="mType" class="field">
                    <option value="goal" data-i18n="opt_goal">Goal (Savings)</option>
                    <option value="debt" data-i18n="opt_debt">Debt (Payoff)</option>
                    <option value="budget" data-i18n="opt_budget">Budget (Monthly)</option>
                </select>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                <div>
                    <label data-i18n="lbl_target">Target Amount</label>
                    <input type="number" id="mTarget" class="field num">
                </div>
                <div>
                    <label data-i18n="lbl_current">Current Balance</label>
                    <input type="number" id="mCurrent" class="field num">
                </div>
            </div>
            <div style="margin-bottom: 25px;">
                <label data-i18n="lbl_mon_alloc">Monthly Allocation</label>
                <input type="number" id="mMonthly" class="field num" required>
            </div>
            <div style="display: flex; gap: 15px;">
                <button type="button" class="btn btn-outline" style="flex: 1;" onclick="closeModal()" data-i18n="btn_cancel">Cancel</button>
                <button type="submit" class="btn btn-primary" style="flex: 1;" data-i18n="btn_save">Save Changes</button>
            </div>
        </form>
    </div>

    <script>
        const resources = {
            en: { translation: {
                sandbox_active: "⚠️ Sandbox mode active - changes not saved",
                app_title: "💰 Salary Planner",
                real_time_plan: "Real-Time Financial Plan",
                act_sandbox: "Activate What-If",
                exit_sandbox: "Exit Sandbox",
                export: "Export",
                import: "Import",
                warning_overAllocated: "Warning: Total allocations exceed net monthly salary",
                lbl_salary: "Monthly Salary",
                lbl_debt_pay: "Debt Payoff",
                lbl_goal_sav: "Goal Savings",
                lbl_unallocated: "Unallocated",
                lbl_progress: "Progress",
                summary_title: "Detailed Summary",
                add_btn: "Add New Envelope",
                col_name: "Envelope",
                col_type: "Type",
                col_target: "Target",
                col_current: "Current",
                col_alloc: "Allocation",
                col_rem: "Remaining",
                col_months: "Months",
                tab_env: "Envelopes",
                tab_visual: "Timeline",
                tab_settings: "Settings",
                cat_budget: "Budget Envelopes",
                cat_debt: "Debt Envelopes",
                cat_goal: "Goal Envelopes",
                lbl_total_monthly: "Total Monthly",
                lbl_rem_amt: "Remaining",
                lbl_mon_ded: "Monthly",
                lbl_permanent: "Permanent",
                lbl_mon_left: "Months left",
                quick_dep: "Add",
                btn_update: "Update",
                btn_edit: "Edit",
                cfg_title: "Global Settings",
                cfg_salary: "Monthly Net Salary (SAR)",
                cfg_date: "Plan Start Date",
                btn_reset: "Reset All Data",
                modal_add: "Add New Envelope",
                modal_update: "Update Envelope",
                lbl_name: "Envelope Name",
                lbl_type: "Type",
                opt_goal: "Goal (Savings)",
                opt_debt: "Debt (Payoff)",
                opt_budget: "Budget (Monthly)",
                lbl_target: "Target Amount",
                lbl_current: "Current Balance",
                lbl_mon_alloc: "Monthly Allocation",
                btn_cancel: "Cancel",
                btn_save: "Save Changes",
                goal: "Goal", debt: "Debt", budget: "Budget",
                confirm_del: "Delete this envelope?",
                confirm_reset: "WARNING: Delete all data? This cannot be undone."
            }},
            ar: { translation: {
                sandbox_active: "⚠️ وضع التجربة نشط - التغييرات لن تحفظ",
                app_title: "💰 مخطط الراتب",
                real_time_plan: "الخطة المالية الحالية",
                act_sandbox: "تفعيل وضع التجربة",
                exit_sandbox: "الخروج من التجربة",
                export: "تصدير",
                import: "استيراد",
                warning_overAllocated: "تنبيه: مجموع التخصيصات يتجاوز صافي الراتب الشهري",
                lbl_salary: "الراتب الشهري",
                lbl_debt_pay: "سداد الديون",
                lbl_goal_sav: "ادخار الأهداف",
                lbl_unallocated: "المبلغ المتبقي",
                lbl_progress: "التقدم الإجمالي",
                summary_title: "الملخص التفصيلي",
                add_btn: "إضافة ظرف جديد",
                col_name: "اسم الظرف",
                col_type: "النوع",
                col_target: "الهدف",
                col_current: "الحالي",
                col_alloc: "التخصيص",
                col_rem: "المتبقي",
                col_months: "الشهور",
                tab_env: "الأظرف",
                tab_visual: "الجدول الزمني",
                tab_settings: "الإعدادات",
                cat_budget: "أظرف الميزانية",
                cat_debt: "أظرف الديون",
                cat_goal: "أظرف الأهداف",
                lbl_total_monthly: "الإجمالي الشهري",
                lbl_rem_amt: "المبلغ المتبقي",
                lbl_mon_ded: "التخصيص الشهري",
                lbl_permanent: "دائم",
                lbl_mon_left: "شهور متبقية",
                quick_dep: "إيداع",
                btn_update: "تحديث",
                btn_edit: "تعديل",
                cfg_title: "الإعدادات العامة",
                cfg_salary: "صافي الراتب الشهري (ر.س)",
                cfg_date: "تاريخ بدء الخطة",
                btn_reset: "إعادة تعيين كافة البيانات",
                modal_add: "إضافة ظرف جديد",
                modal_update: "تحديث الظرف",
                lbl_name: "اسم الظرف",
                lbl_type: "نوع الظرف",
                opt_goal: "هدف (ادخار)",
                opt_debt: "دين (سداد)",
                opt_budget: "ميزانية (شهري)",
                lbl_target: "المبلغ المستهدف",
                lbl_current: "الرصيد الحالي",
                lbl_mon_alloc: "التخصيص الشهري",
                btn_cancel: "إلغاء",
                btn_save: "حفظ التغييرات",
                goal: "هدف", debt: "دين", budget: "ميزانية",
                confirm_del: "هل تريد حذف هذا الظرف؟",
                confirm_reset: "تحذير: سيتم حذف جميع البيانات. هل أنت متأكد؟"
            }}
        };

        let lang = localStorage.getItem('salary_lang') || 'ar';
        let realData = { salary: 0, startDate: new Date().toISOString().split('T')[0], envelopes: [] };
        let sandboxData = null;
        let isWhatIf = false;
        let activeTab = 'plan';
        let editId = null;

        async function initI18n() {
            await i18next.init({ lng: lang, resources });
            updateContent();
        }

        function updateContent() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                el.innerText = i18next.t(el.getAttribute('data-i18n'));
            });
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('langBtn').innerText = lang === 'ar' ? 'English' : 'العربية';
            render();
        }

        function toggleLang() {
            lang = lang === 'ar' ? 'en' : 'ar';
            localStorage.setItem('salary_lang', lang);
            i18next.changeLanguage(lang, updateContent);
        }

        function load() {
            const saved = localStorage.getItem('salary_planner_v6');
            if (saved) realData = JSON.parse(saved);
            initI18n();
        }

        function toggleWhatIf() {
            isWhatIf = !isWhatIf;
            const body = document.getElementById('bodyRoot');
            if (isWhatIf) {
                sandboxData = JSON.parse(JSON.stringify(realData));
                body.classList.add('what-if-active');
            } else {
                body.classList.remove('what-if-active');
                sandboxData = null;
            }
            updateContent();
        }

        function showTab(t) {
            activeTab = t;
            document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + t).classList.add('active');
            document.querySelectorAll('.pane').forEach(s => s.classList.remove('active'));
            document.getElementById(t + 'Section').classList.add('active');
        }

        function render() {
            const d = isWhatIf ? sandboxData : realData;
            document.getElementById('cfgSalary').value = d.salary;
            document.getElementById('cfgDate').value = d.startDate;

            let ts = { budget: 0, debt: 0, goal: 0, cur: 0, tar: 0 };
            d.envelopes.forEach(e => {
                ts[e.type] += e.monthly;
                ts.cur += e.current;
                ts.tar += (e.type !== 'budget' ? e.target : 0);
            });

            const totalAlloc = ts.budget + ts.debt + ts.goal;
            const unalloc = d.salary - totalAlloc;
            const progress = ts.tar > 0 ? (ts.cur / ts.tar * 100).toFixed(1) : 0;

            document.getElementById('overAllocWarning').style.display = unalloc < 0 ? 'flex' : 'none';

            document.getElementById('highLevelSummary').innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">${i18next.t('lbl_salary')}</div>
                    <div class="stat-val num">${d.salary.toLocaleString()}</div>
                </div>
                <div class="stat-card" style="border-color: var(--danger);">
                    <div class="stat-label">${i18next.t('lbl_debt_pay')}</div>
                    <div class="stat-val num">${ts.debt.toLocaleString()}</div>
                </div>
                <div class="stat-card" style="border-color: var(--success);">
                    <div class="stat-label">${i18next.t('lbl_goal_sav')}</div>
                    <div class="stat-val num">${ts.goal.toLocaleString()}</div>
                </div>
                <div class="stat-card" style="border-color: var(--secondary);">
                    <div class="stat-label">${i18next.t('lbl_unallocated')}</div>
                    <div class="stat-val num" style="color: ${unalloc < 0 ? 'var(--danger)' : 'inherit'}">${unalloc.toLocaleString()}</div>
                </div>
                <div class="stat-card" style="border-color: var(--primary);">
                    <div class="stat-label">${i18next.t('lbl_progress')}</div>
                    <div class="stat-val num">${progress}%</div>
                </div>
            `;

            renderTable(d);
            renderCards(d);
        }

        function renderTable(d) {
            let h = `<table><thead><tr>
                <th>${i18next.t('col_name')}</th><th>${i18next.t('col_type')}</th><th>${i18next.t('col_target')}</th>
                <th>${i18next.t('col_current')}</th><th>${i18next.t('col_alloc')}</th><th>${i18next.t('col_rem')}</th><th>${i18next.t('col_months')}</th>
            </tr></thead><tbody>`;
            let totTar = 0, totCur = 0, totAloc = 0, totRem = 0;

            d.envelopes.forEach(e => {
                const r = Math.max(0, e.target - e.current);
                const m = e.monthly > 0 ? Math.ceil(r / e.monthly) : (e.type === 'budget' ? '-' : '∞');
                h += `<tr>
                    <td>${e.name}</td>
                    <td><span class="badge badge-${e.type}">${i18next.t(e.type)}</span></td>
                    <td class="num num-cell">${e.target.toLocaleString()}</td>
                    <td class="num num-cell">${e.current.toLocaleString()}</td>
                    <td class="num num-cell">${e.monthly.toLocaleString()}</td>
                    <td class="num num-cell">${r.toLocaleString()}</td>
                    <td class="num num-cell">${m}</td>
                </tr>`;
                if(e.type !== 'budget') totTar += e.target;
                totCur += e.current;
                totAloc += e.monthly;
                totRem += r;
            });

            h += `<tr class="tr-total">
                <td colspan="2">${i18next.t('TOTALS') || 'TOTALS'}</td>
                <td class="num num-cell">${totTar.toLocaleString()}</td>
                <td class="num num-cell">${totCur.toLocaleString()}</td>
                <td class="num num-cell">${totAloc.toLocaleString()}</td>
                <td class="num num-cell">${totRem.toLocaleString()}</td>
                <td>-</td>
            </tr></tbody></table>`;
            document.getElementById('summaryTableContainer').innerHTML = h;
        }

        function renderCards(d) {
            const cont = document.getElementById('categorySections');
            cont.innerHTML = '';
            ['budget', 'debt', 'goal'].forEach(type => {
                const envs = d.envelopes.filter(e => e.type === type);
                if(envs.length === 0) return;
                const typeTotal = envs.reduce((a, c) => a + c.monthly, 0);
                const block = document.createElement('div');
                block.innerHTML = `
                    <div style="display:flex; justify-content:space-between; margin: 30px 0 15px;">
                        <h3 style="font-size: 16px;">${i18next.t('cat_' + type)}</h3>
                        <span style="font-weight: 800; color: var(--text-muted);">${i18next.t('lbl_total_monthly')}: ${typeTotal.toLocaleString()}</span>
                    </div>
                    <div class="env-grid" id="grid-${type}"></div>
                `;
                cont.appendChild(block);
                const grid = document.getElementById('grid-' + type);
                envs.forEach(e => {
                    const rem = Math.max(0, e.target - e.current);
                    const months = e.monthly > 0 ? Math.ceil(rem / e.monthly) : '∞';
                    const prog = e.type === 'budget' ? 100 : Math.min(100, (e.current / e.target) * 100);
                    grid.innerHTML += `
                        <div class="env-card ${e.type}">
                            <div style="display:flex; justify-content:space-between;">
                                <div>
                                    <span class="badge badge-${e.type}">${i18next.t(e.type)}</span>
                                    <div style="font-weight:800; font-size:18px; margin-top:5px;">${e.name}</div>
                                </div>
                                <div style="display:flex; gap:8px;">
                                    <button class="btn btn-outline" style="padding:5px 10px;" onclick="openEditModal(${e.id})">${i18next.t('btn_edit')}</button>
                                    <button class="btn btn-danger" style="padding:5px 10px;" onclick="delEnv(${e.id})">✕</button>
                                </div>
                            </div>
                            <div class="num" style="font-size: 22px; font-weight:800; margin-top:15px;">
                                ${e.current.toLocaleString()} <span style="font-size:14px; color:var(--text-muted); font-weight:500;">/ ${e.target.toLocaleString()}</span>
                            </div>
                            <div style="height:8px; background:#f1f5f9; border-radius:4px; margin:15px 0; overflow:hidden;">
                                <div style="width:${prog}%; height:100%; background:var(--${e.type==='goal'?'success':e.type==='debt'?'danger':'warning'}); transition:0.4s;"></div>
                            </div>
                            <div style="display:flex; justify-content:space-between; font-size:13px; font-weight:700;">
                                <span>${i18next.t('lbl_mon_ded')}: ${e.monthly.toLocaleString()}</span>
                                <span>${e.type==='budget' ? i18next.t('lbl_permanent') : months + ' ' + i18next.t('lbl_mon_left')}</span>
                            </div>
                        </div>
                    `;
                });
            });
        }

        function openAddModal() {
            editId = null;
            document.getElementById('modalTitle').innerText = i18next.t('modal_add');
            document.getElementById('envModal').classList.add('active');
        }

        function openEditModal(id) {
            editId = id;
            const d = isWhatIf ? sandboxData : realData;
            const e = d.envelopes.find(i => i.id === id);
            document.getElementById('mName').value = e.name;
            document.getElementById('mType').value = e.type;
            document.getElementById('mTarget').value = e.target;
            document.getElementById('mCurrent').value = e.current;
            document.getElementById('mMonthly').value = e.monthly;
            document.getElementById('modalTitle').innerText = i18next.t('modal_update');
            document.getElementById('envModal').classList.add('active');
        }

        function closeModal() { document.getElementById('envModal').classList.remove('active'); }

        function saveEnv(ev) {
            ev.preventDefault();
            const e = {
                id: editId || Date.now(),
                name: document.getElementById('mName').value,
                type: document.getElementById('mType').value,
                target: parseFloat(document.getElementById('mTarget').value) || 0,
                current: parseFloat(document.getElementById('mCurrent').value) || 0,
                monthly: parseFloat(document.getElementById('mMonthly').value) || 0
            };
            const d = isWhatIf ? sandboxData : realData;
            if(editId) {
                const idx = d.envelopes.findIndex(i => i.id === editId);
                d.envelopes[idx] = e;
            } else {
                d.envelopes.push(e);
            }
            if(!isWhatIf) localStorage.setItem('salary_planner_v6', JSON.stringify(realData));
            closeModal();
            render();
        }

        function quickUp(id) {
            const val = parseFloat(document.getElementById('q-' + id).value) || 0;
            const d = isWhatIf ? sandboxData : realData;
            const e = d.envelopes.find(i => i.id === id);
            if(e) { e.current += val; if(!isWhatIf) localStorage.setItem('salary_planner_v6', JSON.stringify(realData)); render(); }
        }

        function delEnv(id) {
            if(!confirm(i18next.t('confirm_del'))) return;
            const d = isWhatIf ? sandboxData : realData;
            d.envelopes = d.envelopes.filter(i => i.id !== id);
            if(!isWhatIf) localStorage.setItem('salary_planner_v6', JSON.stringify(realData));
            render();
        }

        function updateGlobal() {
            const d = isWhatIf ? sandboxData : realData;
            d.salary = parseFloat(document.getElementById('cfgSalary').value) || 0;
            d.startDate = document.getElementById('cfgDate').value;
            if(!isWhatIf) localStorage.setItem('salary_planner_v6', JSON.stringify(realData));
            render();
        }

        function exportData() {
            const b = new Blob([JSON.stringify(realData, null, 2)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(b); a.download = `salary-planner.json`; a.click();
        }

        function importData(ev) {
            const f = ev.target.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = (e) => {
                realData = JSON.parse(e.target.result);
                localStorage.setItem('salary_planner_v6', JSON.stringify(realData));
                location.reload();
            };
            r.readAsText(f);
        }

        function resetAll() {
            if(!confirm(i18next.t('confirm_reset'))) return;
            localStorage.removeItem('salary_planner_v6');
            location.reload();
        }

        load();
    </script>
</body>
</html>
